<app-navbar />
<main class="pt-28">
  <router-outlet />
</main>

<!-- Toast outlet -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2">
  @for (t of toast.toasts(); track t.id) {
    <div [class]="'flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white transition-all ' + (t.type === 'error' ? 'bg-red-600' : t.type === 'success' ? 'bg-green-600' : 'bg-zinc-800')">
      <span>{{ t.message }}</span>
      <button (click)="toast.dismiss(t.id)" class="opacity-70 hover:opacity-100">&times;</button>
    </div>
  }
</div>
